services:
  - type: web
    name: saikona-backend
    runtime: docker
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        value: ""          # Add your Supabase Postgres URL here (optional)
      - key: SUPABASE_URL
        value: "https://lhdwzndntuxqhzwfjthc.supabase.co"
      - key: SUPABASE_SERVICE_KEY
        value: ""          # Paste your service_role key here
      - key: SUPABASE_BUCKET
        value: "saikona-media"
